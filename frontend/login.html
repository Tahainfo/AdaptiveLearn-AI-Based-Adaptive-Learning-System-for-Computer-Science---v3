<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AdaptiveLearn — Connexion</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #eff6ff 0%, #f8fafc 50%, #f0fdf4 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            -webkit-font-smoothing: antialiased;
        }

        .login-card {
            background: #ffffff;
            border-radius: 20px;
            box-shadow: 0 8px 40px rgba(37, 99, 235, 0.10), 0 2px 8px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 420px;
            padding: 2.5rem 2.25rem 2rem;
            border: 1px solid #e2e8f0;
        }

        /* ── Logo ── */
        .logo-wrap {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            justify-content: center;
            margin-bottom: 0.25rem;
        }
        .logo-mark {
            width: 36px; height: 36px;
            background: #2563eb;
            border-radius: 9px;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
        }
        .logo-mark svg { width: 20px; height: 20px; stroke: white; }
        .logo-name {
            font-size: 1.35rem;
            font-weight: 800;
            color: #0f172a;
            letter-spacing: -0.02em;
        }
        .tagline {
            text-align: center;
            color: #64748b;
            font-size: 0.875rem;
            margin-bottom: 2rem;
        }

        /* ── Role Selector ── */
        .role-selector {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.5rem;
            background: #f1f5f9;
            border-radius: 12px;
            padding: 0.35rem;
            margin-bottom: 1.75rem;
        }
        .role-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.45rem;
            padding: 0.6rem 1rem;
            border-radius: 8px;
            border: none;
            background: transparent;
            color: #64748b;
            font-family: inherit;
            font-size: 0.875rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 180ms ease;
        }
        .role-btn svg { width: 15px; height: 15px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; flex-shrink: 0; }
        .role-btn.active {
            background: #ffffff;
            color: #2563eb;
            box-shadow: 0 1px 4px rgba(0,0,0,0.10);
        }

        /* ── Form ── */
        .form-group {
            margin-bottom: 1rem;
        }
        label {
            display: block;
            font-size: 0.8125rem;
            font-weight: 600;
            color: #374151;
            margin-bottom: 0.35rem;
        }
        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 0.65rem 0.875rem;
            border: 1.5px solid #e2e8f0;
            border-radius: 9px;
            font-family: inherit;
            font-size: 0.9375rem;
            color: #0f172a;
            background: #f8fafc;
            outline: none;
            transition: border-color 160ms ease, box-shadow 160ms ease, background 160ms ease;
        }
        input:focus {
            border-color: #2563eb;
            background: #ffffff;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.12);
        }

        /* ── Submit Button ── */
        .btn-login {
            width: 100%;
            padding: 0.75rem 1rem;
            background: #2563eb;
            color: #ffffff;
            border: none;
            border-radius: 10px;
            font-family: inherit;
            font-size: 0.9375rem;
            font-weight: 700;
            cursor: pointer;
            margin-top: 0.5rem;
            transition: background 160ms ease, transform 100ms ease, box-shadow 160ms ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }
        .btn-login:hover { background: #1d4ed8; box-shadow: 0 4px 14px rgba(37,99,235,0.25); }
        .btn-login:active { transform: scale(0.98); }
        .btn-login:disabled { background: #93c5fd; cursor: not-allowed; transform: none; box-shadow: none; }
        .btn-login .spinner {
            width: 16px; height: 16px;
            border: 2px solid rgba(255,255,255,0.4);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            display: none;
        }
        .btn-login.loading .spinner { display: block; }
        .btn-login.loading .btn-text { display: none; }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── Error ── */
        .error-msg {
            display: none;
            background: #fef2f2;
            border: 1px solid #fecaca;
            color: #dc2626;
            border-radius: 8px;
            padding: 0.6rem 0.875rem;
            font-size: 0.8125rem;
            font-weight: 500;
            margin-top: 0.75rem;
            align-items: center;
            gap: 0.4rem;
        }
        .error-msg.visible {
            display: flex;
        }
        .error-msg svg { flex-shrink: 0; width: 14px; height: 14px; }

        /* ── Footer ── */
        .card-footer {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: #94a3b8;
        }
    </style>
</head>
<body>

<div class="login-card">
    <!-- Logo -->
    <div class="logo-wrap">
        <div class="logo-mark">
            <svg viewBox="0 0 24 24"><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/></svg>
        </div>
        <span class="logo-name">AdaptiveLearn</span>
    </div>
    <p class="tagline">Système d'Apprentissage Adaptatif</p>

    <!-- Role Selector -->
    <div class="role-selector" role="group" aria-label="Sélectionner un rôle">
        <button class="role-btn active" id="roleStudent" onclick="selectRole('student')" type="button">
            <svg viewBox="0 0 24 24"><path d="M12 2l10 5v6c0 5-4 9-10 11C6 22 2 18 2 13V7z"/><path d="M9 12l2 2 4-4"/></svg>
            Étudiant
        </button>
        <button class="role-btn" id="roleAdmin" onclick="selectRole('admin')" type="button">
            <svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
            Administrateur
        </button>
    </div>

    <!-- Login Form -->
    <form id="loginForm" onsubmit="handleLogin(event)" novalidate>
        <div class="form-group">
            <label for="username">Nom d'utilisateur</label>
            <input type="text" id="username" placeholder="Entrez votre identifiant" autocomplete="username" required>
        </div>
        <div class="form-group">
            <label for="password">Mot de passe</label>
            <input type="password" id="password" placeholder="Entrez votre mot de passe" autocomplete="current-password" required>
        </div>

        <button type="submit" class="btn-login" id="submitBtn">
            <span class="spinner"></span>
            <span class="btn-text">Se connecter</span>
        </button>

        <div class="error-msg" id="errorMsg" role="alert">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
            </svg>
            <span id="errorText"></span>
        </div>
    </form>

    <p class="card-footer">AdaptiveLearn &copy; 2025</p>
</div>

<script>
    const API_BASE = window.location.origin;
    let selectedRole = 'student';

    // If already authenticated, redirect immediately
    (function checkExistingSession() {
        const token = localStorage.getItem('token');
        const adminToken = localStorage.getItem('adminToken');
        if (adminToken) { window.location.replace('/admin.html'); return; }
        if (token)      { window.location.replace('/index.html'); }
    })();

    function selectRole(role) {
        selectedRole = role;
        document.getElementById('roleStudent').classList.toggle('active', role === 'student');
        document.getElementById('roleAdmin').classList.toggle('active', role === 'admin');
        clearError();
    }

    function showError(msg) {
        const el = document.getElementById('errorMsg');
        document.getElementById('errorText').textContent = msg;
        el.classList.add('visible');
    }

    function clearError() {
        document.getElementById('errorMsg').classList.remove('visible');
    }

    function setLoading(on) {
        const btn = document.getElementById('submitBtn');
        btn.classList.toggle('loading', on);
        btn.disabled = on;
    }

    async function handleLogin(event) {
        event.preventDefault();
        clearError();

        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value.trim();

        if (!username || !password) {
            showError('Veuillez remplir tous les champs.');
            return;
        }

        setLoading(true);

        try {
            const response = await fetch(`${API_BASE}/auth/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });

            const data = await response.json();

            if (!response.ok) {
                throw new Error(data.detail || 'Identifiants incorrects.');
            }

            const returnedRole = data.role;

            // Role mismatch: student trying admin portal or vice versa
            if (selectedRole === 'admin' && returnedRole !== 'admin') {
                throw new Error("Ce compte n'a pas les droits administrateur.");
            }
            if (selectedRole === 'student' && returnedRole === 'admin') {
                throw new Error("Ce compte est un compte administrateur. Veuillez sélectionner le rôle Administrateur.");
            }

            // Store credentials and redirect
            if (returnedRole === 'admin') {
                localStorage.setItem('adminToken', data.access_token);
                localStorage.removeItem('token');
                localStorage.removeItem('studentId');
                window.location.replace('/admin.html');
            } else {
                localStorage.setItem('token', data.access_token);
                localStorage.setItem('studentId', data.student_id);
                localStorage.removeItem('adminToken');
                window.location.replace('/index.html');
            }

        } catch (err) {
            showError(err.message || 'Une erreur est survenue.');
        } finally {
            setLoading(false);
        }
    }
</script>
</body>
</html>
