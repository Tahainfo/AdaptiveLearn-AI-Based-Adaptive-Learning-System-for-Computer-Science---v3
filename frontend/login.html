<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AdaptiveLearn — Connexion</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #eff6ff 0%, #f8fafc 50%, #f0fdf4 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            -webkit-font-smoothing: antialiased;
        }

        .login-card {
            background: #ffffff;
            border-radius: 20px;
            box-shadow: 0 8px 40px rgba(37, 99, 235, 0.10), 0 2px 8px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 420px;
            padding: 2.5rem 2.25rem 2rem;
            border: 1px solid #e2e8f0;
        }

        /* ── Logo ── */
        .logo-wrap {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            justify-content: center;
            margin-bottom: 0.25rem;
        }
        .logo-mark {
            width: 36px; height: 36px;
            background: #2563eb;
            border-radius: 9px;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
        }
        .logo-mark svg { width: 20px; height: 20px; stroke: white; }
        .logo-name {
            font-size: 1.35rem;
            font-weight: 800;
            color: #0f172a;
            letter-spacing: -0.02em;
        }
        .tagline {
            text-align: center;
            color: #64748b;
            font-size: 0.875rem;
            margin-bottom: 2rem;
        }

        /* ── Role Selector ── */
        .role-selector {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.5rem;
            background: #f1f5f9;
            border-radius: 12px;
            padding: 0.35rem;
            margin-bottom: 1.75rem;
        }
        .role-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.45rem;
            padding: 0.6rem 1rem;
            border-radius: 8px;
            border: none;
            background: transparent;
            color: #64748b;
            font-family: inherit;
            font-size: 0.875rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 180ms ease;
        }
        .role-btn svg { width: 15px; height: 15px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; flex-shrink: 0; }
        .role-btn.active {
            background: #ffffff;
            color: #2563eb;
            box-shadow: 0 1px 4px rgba(0,0,0,0.10);
        }

        /* ── Tab switcher (Connexion / Inscription) — student only ── */
        .auth-tabs {
            display: none; /* shown via JS when student role is active */
            gap: 0;
            border-bottom: 2px solid #e2e8f0;
            margin-bottom: 1.5rem;
        }
        .auth-tabs.visible { display: flex; }
        .tab-btn {
            flex: 1;
            background: none;
            border: none;
            padding: 0.6rem 0;
            font-family: inherit;
            font-size: 0.875rem;
            font-weight: 600;
            color: #94a3b8;
            cursor: pointer;
            position: relative;
            transition: color 160ms ease;
        }
        .tab-btn::after {
            content: '';
            position: absolute;
            bottom: -2px; left: 0; right: 0;
            height: 2px;
            background: #2563eb;
            border-radius: 2px 2px 0 0;
            transform: scaleX(0);
            transition: transform 200ms ease;
        }
        .tab-btn.active { color: #2563eb; }
        .tab-btn.active::after { transform: scaleX(1); }

        /* ── Form panels ── */
        .form-panel { display: none; }
        .form-panel.active { display: block; }

        /* ── Form fields ── */
        .form-group { margin-bottom: 1rem; }
        label {
            display: block;
            font-size: 0.8125rem;
            font-weight: 600;
            color: #374151;
            margin-bottom: 0.35rem;
        }
        input[type="text"],
        input[type="email"],
        input[type="password"] {
            width: 100%;
            padding: 0.65rem 0.875rem;
            border: 1.5px solid #e2e8f0;
            border-radius: 9px;
            font-family: inherit;
            font-size: 0.9375rem;
            color: #0f172a;
            background: #f8fafc;
            outline: none;
            transition: border-color 160ms ease, box-shadow 160ms ease, background 160ms ease;
        }
        input:focus {
            border-color: #2563eb;
            background: #ffffff;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.12);
        }

        /* ── Buttons ── */
        .btn-primary {
            width: 100%;
            padding: 0.75rem 1rem;
            background: #2563eb;
            color: #ffffff;
            border: none;
            border-radius: 10px;
            font-family: inherit;
            font-size: 0.9375rem;
            font-weight: 700;
            cursor: pointer;
            margin-top: 0.5rem;
            transition: background 160ms ease, transform 100ms ease, box-shadow 160ms ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }
        .btn-primary:hover { background: #1d4ed8; box-shadow: 0 4px 14px rgba(37,99,235,0.25); }
        .btn-primary:active { transform: scale(0.98); }
        .btn-primary:disabled { background: #93c5fd; cursor: not-allowed; transform: none; box-shadow: none; }

        .spinner {
            width: 16px; height: 16px;
            border: 2px solid rgba(255,255,255,0.4);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            display: none;
        }
        .btn-primary.loading .spinner { display: block; }
        .btn-primary.loading .btn-text { display: none; }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── Success banner ── */
        .success-msg {
            display: none;
            background: #f0fdf4;
            border: 1px solid #bbf7d0;
            color: #15803d;
            border-radius: 8px;
            padding: 0.6rem 0.875rem;
            font-size: 0.8125rem;
            font-weight: 500;
            margin-top: 0.75rem;
            align-items: center;
            gap: 0.4rem;
        }
        .success-msg.visible { display: flex; }
        .success-msg svg { flex-shrink: 0; width: 14px; height: 14px; }

        /* ── Error ── */
        .error-msg {
            display: none;
            background: #fef2f2;
            border: 1px solid #fecaca;
            color: #dc2626;
            border-radius: 8px;
            padding: 0.6rem 0.875rem;
            font-size: 0.8125rem;
            font-weight: 500;
            margin-top: 0.75rem;
            align-items: center;
            gap: 0.4rem;
        }
        .error-msg.visible { display: flex; }
        .error-msg svg { flex-shrink: 0; width: 14px; height: 14px; }

        /* ── Footer ── */
        .card-footer {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: #94a3b8;
        }
    </style>
</head>
<body>

<div class="login-card">
    <!-- Logo -->
    <div class="logo-wrap">
        <div class="logo-mark">
            <svg viewBox="0 0 24 24"><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/></svg>
        </div>
        <span class="logo-name">AdaptiveLearn</span>
    </div>
    <p class="tagline">Système d'Apprentissage Adaptatif</p>

    <!-- Role Selector -->
    <div class="role-selector" role="group" aria-label="Sélectionner un rôle">
        <button class="role-btn active" id="roleStudent" onclick="selectRole('student')" type="button">
            <svg viewBox="0 0 24 24"><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/></svg>
            Étudiant
        </button>
        <button class="role-btn" id="roleAdmin" onclick="selectRole('admin')" type="button">
            <svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
            Administrateur
        </button>
    </div>

    <!-- Tab switcher — only for student role -->
    <div class="auth-tabs visible" id="authTabs">
        <button class="tab-btn active" id="tabLogin" onclick="switchTab('login')" type="button">Se connecter</button>
        <button class="tab-btn" id="tabRegister" onclick="switchTab('register')" type="button">S'inscrire</button>
    </div>

    <!-- ── Login Panel ── -->
    <div class="form-panel active" id="panelLogin">
        <form onsubmit="handleLogin(event)" novalidate>
            <div class="form-group">
                <label for="loginUsername">Nom d'utilisateur</label>
                <input type="text" id="loginUsername" placeholder="Entrez votre identifiant" autocomplete="username" required>
            </div>
            <div class="form-group">
                <label for="loginPassword">Mot de passe</label>
                <input type="password" id="loginPassword" placeholder="Entrez votre mot de passe" autocomplete="current-password" required>
            </div>
            <button type="submit" class="btn-primary" id="loginBtn">
                <span class="spinner"></span>
                <span class="btn-text">Se connecter</span>
            </button>
            <div class="error-msg" id="loginError" role="alert">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
                <span id="loginErrorText"></span>
            </div>
        </form>
    </div>

    <!-- ── Register Panel (student only) ── -->
    <div class="form-panel" id="panelRegister">
        <form onsubmit="handleRegister(event)" novalidate>
            <div class="form-group">
                <label for="regUsername">Nom d'utilisateur</label>
                <input type="text" id="regUsername" placeholder="Choisissez un identifiant" autocomplete="username" required>
            </div>
            <div class="form-group">
                <label for="regEmail">Adresse e-mail</label>
                <input type="email" id="regEmail" placeholder="votre@email.com" autocomplete="email" required>
            </div>
            <div class="form-group">
                <label for="regPassword">Mot de passe</label>
                <input type="password" id="regPassword" placeholder="Minimum 6 caractères" autocomplete="new-password" required>
            </div>
            <button type="submit" class="btn-primary" id="registerBtn">
                <span class="spinner"></span>
                <span class="btn-text">Créer mon compte</span>
            </button>
            <div class="success-msg" id="registerSuccess" role="status">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
                <span id="registerSuccessText"></span>
            </div>
            <div class="error-msg" id="registerError" role="alert">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
                <span id="registerErrorText"></span>
            </div>
        </form>
    </div>

    <p class="card-footer">AdaptiveLearn &copy; 2026</p>
</div>

<script>
    const API_BASE = window.location.origin;
    let selectedRole = 'student';
    let activeTab = 'login';

    // If already authenticated, redirect immediately
    (function checkExistingSession() {
        const token = localStorage.getItem('token');
        const adminToken = localStorage.getItem('adminToken');
        if (adminToken) { window.location.replace('/admin.html'); return; }
        if (token)      { window.location.replace('/index.html'); }
    })();

    // ── Role switching ───────────────────────────────────────────────

    function selectRole(role) {
        selectedRole = role;
        document.getElementById('roleStudent').classList.toggle('active', role === 'student');
        document.getElementById('roleAdmin').classList.toggle('active', role === 'admin');

        const tabs = document.getElementById('authTabs');
        if (role === 'student') {
            tabs.classList.add('visible');
        } else {
            tabs.classList.remove('visible');
            // Admin always goes to login panel
            switchTab('login');
        }
        clearAll();
    }

    // ── Tab switching ────────────────────────────────────────────────

    function switchTab(tab) {
        activeTab = tab;
        document.getElementById('tabLogin').classList.toggle('active', tab === 'login');
        document.getElementById('tabRegister').classList.toggle('active', tab === 'register');
        document.getElementById('panelLogin').classList.toggle('active', tab === 'login');
        document.getElementById('panelRegister').classList.toggle('active', tab === 'register');
        clearAll();
    }

    // ── Feedback helpers ─────────────────────────────────────────────

    function clearAll() {
        ['loginError', 'registerError', 'registerSuccess'].forEach(id => {
            document.getElementById(id).classList.remove('visible');
        });
    }

    function showError(id, msg) {
        const el = document.getElementById(id);
        el.querySelector('span:last-child').textContent = msg;
        el.classList.add('visible');
    }

    function showSuccess(id, msg) {
        const el = document.getElementById(id);
        el.querySelector('span:last-child').textContent = msg;
        el.classList.add('visible');
    }

    function setLoading(btnId, on) {
        const btn = document.getElementById(btnId);
        btn.classList.toggle('loading', on);
        btn.disabled = on;
    }

    // ── Login ────────────────────────────────────────────────────────

    async function handleLogin(event) {
        event.preventDefault();
        clearAll();

        const username = document.getElementById('loginUsername').value.trim();
        const password = document.getElementById('loginPassword').value.trim();

        if (!username || !password) {
            showError('loginError', 'Veuillez remplir tous les champs.');
            return;
        }

        setLoading('loginBtn', true);

        try {
            const response = await fetch(`${API_BASE}/auth/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });

            const data = await response.json();

            if (!response.ok) {
                throw new Error(data.detail || 'Identifiants incorrects.');
            }

            const returnedRole = data.role;

            if (selectedRole === 'admin' && returnedRole !== 'admin') {
                throw new Error("Ce compte n'a pas les droits administrateur.");
            }
            if (selectedRole === 'student' && returnedRole === 'admin') {
                throw new Error("Ce compte est administrateur. Sélectionnez le rôle Administrateur.");
            }

            if (returnedRole === 'admin') {
                localStorage.setItem('adminToken', data.access_token);
                localStorage.removeItem('token');
                localStorage.removeItem('studentId');
                window.location.replace('/admin.html');
            } else {
                localStorage.setItem('token', data.access_token);
                localStorage.setItem('studentId', data.student_id);
                localStorage.removeItem('adminToken');
                window.location.replace('/index.html');
            }

        } catch (err) {
            showError('loginError', err.message || 'Une erreur est survenue.');
        } finally {
            setLoading('loginBtn', false);
        }
    }

    // ── Register ─────────────────────────────────────────────────────

    async function handleRegister(event) {
        event.preventDefault();
        clearAll();

        const username = document.getElementById('regUsername').value.trim();
        const email    = document.getElementById('regEmail').value.trim();
        const password = document.getElementById('regPassword').value.trim();

        if (!username || !email || !password) {
            showError('registerError', 'Veuillez remplir tous les champs.');
            return;
        }
        if (password.length < 6) {
            showError('registerError', 'Le mot de passe doit contenir au moins 6 caractères.');
            return;
        }

        setLoading('registerBtn', true);

        try {
            const response = await fetch(`${API_BASE}/auth/register`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, email, password })
            });

            const data = await response.json();

            if (!response.ok) {
                throw new Error(data.detail || "L'inscription a échoué.");
            }

            // Clear fields and switch to login with success notice
            document.getElementById('regUsername').value = '';
            document.getElementById('regEmail').value = '';
            document.getElementById('regPassword').value = '';

            showSuccess('registerSuccess', 'Compte créé ! Vous pouvez maintenant vous connecter.');

            setTimeout(() => {
                switchTab('login');
                document.getElementById('loginUsername').value = username;
                document.getElementById('loginUsername').focus();
            }, 1800);

        } catch (err) {
            showError('registerError', err.message || 'Une erreur est survenue.');
        } finally {
            setLoading('registerBtn', false);
        }
    }
</script>
</body>
</html>
